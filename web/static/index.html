<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LaTeX Helper</title>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
          onload="window._katexReady = true;"></script>

  <!-- Monaco Editor -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.js"></script>

  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- Upload Section -->
  <header id="app-header">
    <h1>LaTeX Helper</h1>
    <span id="llm-badge" class="badge">…</span>
  </header>

  <section id="upload-section">
    <div id="drop-target" tabindex="0" role="button" aria-label="Upload PDF or image">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p>Drag &amp; drop a PDF or image here</p>
      <p class="sub">or <label for="file-input" class="browse-link">browse file</label></p>
      <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg,.gif,.webp">
    </div>
    <div id="file-info" hidden></div>
    <div id="upload-actions">
      <button id="convert-btn" disabled>Convert to LaTeX</button>
      <button id="clear-btn" hidden>Clear</button>
    </div>
    <div id="progress-wrap" hidden>
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <span id="progress-label">Converting…</span>
    </div>
    <div id="error-msg" hidden></div>
  </section>

  <!-- Editor + Preview Section -->
  <section id="editor-section" hidden>
    <div id="editor-pane">
      <div id="editor-toolbar">
        <span class="toolbar-title">LaTeX Source</span>
        <button id="download-btn" title="Download .tex file">⬇ Download .tex</button>
        <button id="compile-btn" title="Compile to PDF with pdflatex">⚙ Compile PDF</button>
      </div>
      <div id="monaco-container"></div>
      <div id="compile-log" hidden>
        <div class="log-header">pdflatex log <button id="close-log">✕</button></div>
        <pre id="log-content"></pre>
      </div>
    </div>

    <div id="preview-pane">
      <div id="preview-tabs">
        <button class="tab-btn active" data-tab="katex">KaTeX Preview</button>
        <button class="tab-btn" data-tab="pdf" id="pdf-tab-btn">PDF Preview</button>
      </div>
      <div id="katex-preview" class="tab-content active"></div>
      <iframe id="pdf-preview" class="tab-content" src="about:blank" hidden></iframe>
    </div>
  </section>

  <footer id="app-footer">
    <span id="footer-llm"></span>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
